version: '3.9'
services:
  redis:
    image: redis:7-alpine
    container_name: pmvp_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp_daemon:
    image: python:3.12-slim
    container_name: pmvp_daemon
    depends_on:
      redis:
        condition: service_started
    working_dir: /app
    volumes:
      - .:/app:cached
    command: sh -c "python -m pip install --upgrade pip && pip install -r requirements.txt && uvicorn mcp_server.app:app --host 0.0.0.0 --port 8000"
    environment:
      REDIS_URL: "redis://redis:6379/0"
      DEPLOY_REPO_PATH: "/app"
    ports:
      - "8000:8000"

  sandbox:
    image: python:3.12-slim
    container_name: pmvp_sandbox
    working_dir: /sandbox
    volumes:
      - ./sandbox:/sandbox
    command: sh -c "python -m http.server 8080"
    ports:
      - "8080:8080"
    restart: unless-stopped
